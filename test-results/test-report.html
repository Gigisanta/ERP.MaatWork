<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Report - MAATWORK</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      background: #0f172a;
      color: #e2e8f0;
    }
    .header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .status {
      display: inline-block;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-size: 2rem;
      font-weight: bold;
      background: #22c55e;
      color: white;
      margin: 1rem 0;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }
    .metric-card {
      background: #1e293b;
      padding: 1.5rem;
      border-radius: 0.5rem;
      border: 1px solid #334155;
    }
    .metric-label {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }
    .metric-value {
      font-size: 2rem;
      font-weight: bold;
      color: #e2e8f0;
    }
    .packages {
      background: #1e293b;
      padding: 1.5rem;
      border-radius: 0.5rem;
      border: 1px solid #334155;
      margin: 2rem 0;
    }
    .package {
      display: inline-block;
      padding: 0.5rem 1rem;
      margin: 0.25rem;
      background: #334155;
      border-radius: 0.25rem;
      font-family: 'Courier New', monospace;
      font-size: 0.875rem;
    }
    .timestamp {
      text-align: center;
      color: #64748b;
      margin-top: 2rem;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧪 Test Report</h1>
    <div class="status">✅ SUCCESS</div>
  </div>

  <div class="metrics">
    <div class="metric-card">
      <div class="metric-label">Duration</div>
      <div class="metric-value">63.04s</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Concurrency</div>
      <div class="metric-value">4 threads</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Packages</div>
      <div class="metric-value">4</div>
    </div>
  </div>

  <div class="packages">
    <h3>Tested Packages</h3>
    <span class="package">@maatwork/ui</span><span class="package">@maatwork/api</span><span class="package">@maatwork/web</span><span class="package">@maatwork/analytics-service</span>
  </div>

  <div class="timestamp">
    Generated: 12/30/2025, 1:32:53 PM
  </div>
</body>
</html>
