# render.yaml - Configuración completa para Render (100% Gratis)
# Documentación: https://render.com/docs/blueprint-spec

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # WEB SERVICE (Next.js)
  # ═══════════════════════════════════════════════════════════════════════════
  - type: web
    name: maatwork-web
    runtime: node
    region: oregon
    plan: free
    branch: master
    buildFilter:
      paths:
        - apps/web/**
        - packages/**
        - pnpm-lock.yaml
        - package.json
        - pnpm-workspace.yaml
        - turbo.json
      ignoredPaths:
        - apps/api/**
        - apps/analytics-service/**
        - docs/**
        - .github/**
    buildCommand: |
      corepack enable
      corepack prepare pnpm@latest --activate
      pnpm install --frozen-lockfile
      pnpm --filter @maatwork/web build
      cp -r apps/web/public apps/web/.next/standalone/apps/web/public
      cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
    startCommand: |
      node apps/web/.next/standalone/apps/web/server.js
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEXT_TELEMETRY_DISABLED
        value: '1'
      - key: DISABLE_ESLINT_PLUGIN
        value: 'true'
      - key: NEXT_PUBLIC_API_URL
        value: https://maatwork-api.onrender.com
    healthCheckPath: /
    autoDeploy: true
    numInstances: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # API SERVICE (Express.js)
  # ═══════════════════════════════════════════════════════════════════════════
  - type: web
    name: maatwork-api
    runtime: node
    region: oregon
    plan: free
    branch: master
    buildFilter:
      paths:
        - apps/api/**
        - packages/**
        - pnpm-lock.yaml
        - package.json
        - pnpm-workspace.yaml
        - turbo.json
      ignoredPaths:
        - apps/web/**
        - apps/analytics-service/**
        - docs/**
        - .github/**
    buildCommand: |
      corepack enable
      corepack prepare pnpm@latest --activate
      pnpm install --frozen-lockfile
      pnpm --filter @maatwork/api build
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: maatwork-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://maatwork-web.onrender.com
      - key: COOKIE_DOMAIN
        value: .onrender.com
      - key: GOOGLE_CLIENT_ID
        value: placeholder-change-me
      - key: GOOGLE_CLIENT_SECRET
        value: placeholder-change-me
      - key: GOOGLE_REDIRECT_URI
        value: https://maatwork-api.onrender.com/v1/auth/google/callback
      - key: GOOGLE_ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://maatwork-web.onrender.com,http://localhost:3000
    healthCheckPath: /health
    autoDeploy: true
    numInstances: 1

# ═══════════════════════════════════════════════════════════════════════════
# DATABASE (PostgreSQL - Crear desde el Dashboard de Render)
# ═══════════════════════════════════════════════════════════════════════════
# Ve a https://dashboard.render.com → New → PostgreSQL
# Nombre: maatwork-db
# Plan: Free
