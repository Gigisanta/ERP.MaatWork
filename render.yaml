# render.yaml - Configuración completa para Render (100% Gratis)
# Documentación: https://render.com/docs/blueprint-spec

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # WEB SERVICE (Next.js)
  # ═══════════════════════════════════════════════════════════════════════════
  - type: web
    name: maatwork-web
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildFilter:
      paths:
        - apps/web/**
        - packages/**
        - pnpm-lock.yaml
        - package.json
        - pnpm-workspace.yaml
        - turbo.json
      ignoredPaths:
        - apps/api/**
        - apps/analytics-service/**
        - docs/**
        - .github/**
    buildCommand: |
      corepack enable
      corepack prepare pnpm@latest --activate
      pnpm install --frozen-lockfile
      pnpm --filter @maatwork/web build
    startCommand: pnpm --filter @maatwork/web start
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://maatwork-api.onrender.com
    healthCheckPath: /
    autoDeploy: true
    numInstances: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # API SERVICE (Express.js)
  # ═══════════════════════════════════════════════════════════════════════════
  - type: web
    name: maatwork-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildFilter:
      paths:
        - apps/api/**
        - packages/**
        - pnpm-lock.yaml
        - package.json
        - pnpm-workspace.yaml
        - turbo.json
      ignoredPaths:
        - apps/web/**
        - apps/analytics-service/**
        - docs/**
        - .github/**
    buildCommand: |
      corepack enable
      corepack prepare pnpm@latest --activate
      pnpm install --frozen-lockfile
      pnpm --filter @maatwork/api build
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: maatwork-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        value: https://maatwork-web.onrender.com
      - key: CORS_ORIGINS
        value: https://maatwork-web.onrender.com,http://localhost:3000
    healthCheckPath: /health
    autoDeploy: true
    numInstances: 1

# ═══════════════════════════════════════════════════════════════════════════
# DATABASE (PostgreSQL - Crear desde el Dashboard de Render)
# ═══════════════════════════════════════════════════════════════════════════
# Ve a https://dashboard.render.com → New → PostgreSQL
# Nombre: maatwork-db
# Plan: Free
