# Root Railway configuration for monorepo
# Deploys Web app (Next.js) as the main service

[railway]
# Service name
service = "MaatWork"

[build]
# Build command - build all packages
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && pnpm -F @maatwork/types build && pnpm -F @maatwork/utils build && pnpm -F @maatwork/logger build && pnpm -F @maatwork/db build && pnpm -F @maatwork/ui build && pnpm -F @maatwork/web build"

[nixpacks]
node_version = "22"

[deploy]
# Start command - Web runs on port 3000
startCommand = "pnpm -F @maatwork/web start"

# Health check
healthcheckPath = "/"
healthcheckTimeout = 300

# Port
port = 3000

# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
