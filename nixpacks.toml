# Nixpacks configuration for MaatWork monorepo

# Configure API service
[phases.setup]
nixPkgs = ["nodejs", "pnpm"]

[phases.build]
cmds = ["pnpm install --frozen-lockfile=false", "pnpm run build --filter=@maatwork/api"]

[start]
cmd = "node apps/api/dist/index.js"

[phases.install]
dependsOn = ["setup"]

[variables]
NODE_ENV = "production"
PORT = "3001"
