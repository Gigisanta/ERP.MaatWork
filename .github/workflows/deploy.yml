# ═══════════════════════════════════════════════════════════════════════════════════
# DEPLOY PIPELINE - Solo Render (100% Gratis)
# ═══════════════════════════════════════════════════════════════════════════════════

name: 🚀 Deploy to Render

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # JOB 1: Calidad de Código
  # ═══════════════════════════════════════════════════════════════════════════════
  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm lint
        continue-on-error: true

      - name: 🏗️ Type Check
        run: pnpm typecheck
        continue-on-error: true

      - name: 🧪 Test
        run: pnpm test
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # JOB 2: Deploy a Render
  # ═══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to Render
    needs: quality
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Render (Web)
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_WEB_SERVICE_ID }}/deploys" \
            -d '{"clearCache": "clear"}' || true

      - name: 🚀 Deploy to Render (API)
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_API_SERVICE_ID }}/deploys" \
            -d '{"clearCache": "clear"}' || true

      - name: ⏳ Wait for Deploy
        run: sleep 90

      - name: 🏥 Health Check - Web
        run: |
          for i in {1..15}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" https://maatwork-web.onrender.com/ || echo "000")
            if [ "$response" = "200" ] || [ "$response" = "304" ]; then
              echo "✅ Web is healthy!"
              exit 0
            fi
            echo "Attempt $i: Web returned $response, waiting..."
            sleep 10
          done
          echo "⚠️ Web health check completed with warnings"

      - name: 🏥 Health Check - API
        run: |
          for i in {1..15}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" https://maatwork-api.onrender.com/health || echo "000")
            if [ "$response" = "200" ]; then
              echo "✅ API is healthy!"
              exit 0
            fi
            echo "Attempt $i: API returned $response, waiting..."
            sleep 10
          done
          echo "⚠️ API health check completed"

      - name: 📊 Summary
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "🎉 DEPLOYMENT COMPLETE!"
          echo "════════════════════════════════════════════════════════════"
          echo "🌐 Web:  https://maatwork-web.onrender.com"
          echo "🔧 API:  https://maatwork-api.onrender.com"
          echo "🗃️  DB:   Render PostgreSQL (Free)"
          echo "════════════════════════════════════════════════════════════"
