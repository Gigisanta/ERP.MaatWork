name: Deploy to DEV

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - all
          - api
          - web
          - analytics

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.10.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (safety check)
        run: pnpm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get ECR repository URIs
        id: ecr-uris
        run: |
          echo "api_repo=$(aws cloudformation describe-stacks --stack-name CactusDev-Compute --query 'Stacks[0].Outputs[?OutputKey==`ApiRepoUri`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "web_repo=$(aws cloudformation describe-stacks --stack-name CactusDev-Compute --query 'Stacks[0].Outputs[?OutputKey==`WebRepoUri`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "analytics_repo=$(aws cloudformation describe-stacks --stack-name CactusDev-Compute --query 'Stacks[0].Outputs[?OutputKey==`AnalyticsRepoUri`].OutputValue' --output text)" >> $GITHUB_OUTPUT

      # Deploy API
      - name: Build and push API image
        if: inputs.service == 'all' || inputs.service == 'api'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-uris.outputs.api_repo }}:latest
            ${{ steps.ecr-uris.outputs.api_repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update API ECS Service
        if: inputs.service == 'all' || inputs.service == 'api'
        run: |
          aws ecs update-service \
            --cluster cactus-dev \
            --service api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      # Deploy Web
      - name: Build and push Web image
        if: inputs.service == 'all' || inputs.service == 'web'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-uris.outputs.web_repo }}:latest
            ${{ steps.ecr-uris.outputs.web_repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.DEV_API_URL }}

      - name: Update Web ECS Service
        if: inputs.service == 'all' || inputs.service == 'web'
        run: |
          aws ecs update-service \
            --cluster cactus-dev \
            --service web \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      # Deploy Analytics
      - name: Build and push Analytics image
        if: inputs.service == 'all' || inputs.service == 'analytics'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/analytics-service/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-uris.outputs.analytics_repo }}:latest
            ${{ steps.ecr-uris.outputs.analytics_repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Analytics ECS Service
        if: inputs.service == 'all' || inputs.service == 'analytics'
        run: |
          aws ecs update-service \
            --cluster cactus-dev \
            --service analytics \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment to complete
        run: |
          services=""
          if [ "${{ inputs.service }}" == "all" ]; then
            services="api web analytics"
          else
            services="${{ inputs.service }}"
          fi
          
          for service in $services; do
            echo "⏳ Waiting for $service to stabilize..."
            aws ecs wait services-stable \
              --cluster cactus-dev \
              --services $service \
              --region ${{ env.AWS_REGION }}
            echo "✅ $service is stable"
          done

      - name: Get deployment URLs
        id: urls
        run: |
          ALB_DNS=$(aws cloudformation describe-stacks --stack-name CactusDev-Compute --query 'Stacks[0].Outputs[?OutputKey==`LoadBalancerDNS`].OutputValue' --output text)
          echo "ALB_DNS=$ALB_DNS" >> $GITHUB_OUTPUT
          echo "api_url=http://$ALB_DNS" >> $GITHUB_OUTPUT
          echo "web_url=http://$ALB_DNS:8080" >> $GITHUB_OUTPUT
          echo "analytics_url=http://$ALB_DNS:3002" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "## 🚀 Deployment Successful (DEV)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Services" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ inputs.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: ${{ steps.urls.outputs.api_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Web**: ${{ steps.urls.outputs.web_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Analytics**: ${{ steps.urls.outputs.analytics_url }}" >> $GITHUB_STEP_SUMMARY
