name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test -- --coverage --passWithNoTests
      - name: Build
        run: pnpm build
      - name: Upload API dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
      - name: Upload Web .next
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-next
          path: apps/web/.next

