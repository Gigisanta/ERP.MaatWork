# Configuración alternativa a Renovate
# Si prefieres usar Dependabot en lugar de Renovate, descomenta esta configuración
# y elimina renovate.json

version: 2
updates:
  # Actualizar dependencias del root package.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      dev-dependencies:
        patterns:
          - "@types/*"
          - "eslint*"
          - "@eslint/*"
          - "@testing-library/*"
          - "vitest"
          - "playwright"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "eslint*"
          - "@eslint/*"
          - "@testing-library/*"
          - "vitest"
          - "playwright"
        update-types:
          - "patch"

  # Actualizar dependencias de apps/api
  - package-ecosystem: "npm"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "api"
    commit-message:
      prefix: "chore(deps): api"
      include: "scope"

  # Actualizar dependencias de apps/web
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "web"
    commit-message:
      prefix: "chore(deps): web"
      include: "scope"

  # Actualizar dependencias de packages/db
  - package-ecosystem: "npm"
    directory: "/packages/db"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "db"
    commit-message:
      prefix: "chore(deps): db"
      include: "scope"

  # Actualizar dependencias de packages/ui
  - package-ecosystem: "npm"
    directory: "/packages/ui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ui"
    commit-message:
      prefix: "chore(deps): ui"
      include: "scope"

  # Actualizar dependencias de GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"




