# ============================================================
# CACTUS CRM - Configuración TMUX Avanzada
# Optimizada para desarrollo y debugging
# ============================================================

# ============================================================
# Configuración General
# ============================================================

# Prefijo (Ctrl+b por defecto, mantener estándar)
unbind C-b
set-option -g prefix C-b
bind-key C-b send-prefix

# Habilitar mouse (útil para cambiar paneles)
set -g mouse on

# Scrollback aumentado para debugging (50,000 líneas)
set -g history-limit 50000

# Renombrar ventanas automáticamente
setw -g automatic-rename on
set -g renumber-windows on

# Tiempo de espera más corto para comandos
set -sg escape-time 10

# Actualizar variables de entorno en tmux
set -g update-environment 'DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_CONNECTION SSH_TTY'

# ============================================================
# Colores y Tema
# ============================================================

# Paleta de colores mejorada (256 colores)
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Colores de modo
setw -g mode-style 'fg=colour231,bg=colour196,bold'

# Colores de mensajes
set -g message-style 'fg=colour231,bg=colour196,bold'
set -g message-command-style 'fg=colour231,bg=colour196,bold'

# Colores de paneles
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour51,bold'

# Colores de ventanas
setw -g window-status-style 'fg=colour244,bg=colour234'
setw -g window-status-current-style 'fg=colour51,bg=colour236,bold'

# Colores de actividad
setw -g window-status-activity-style 'fg=colour196,bg=colour234,bold'
setw -g window-status-bell-style 'fg=colour231,bg=colour196,bold'

# ============================================================
# Barra de Estado Personalizada
# ============================================================

# Habilitar barra de estado
set -g status on
set -g status-interval 5

# Posición de la barra (arriba)
set -g status-position top

# Colores de la barra
set -g status-style 'fg=colour231,bg=colour236'

# Lado izquierdo: Sesión y ventanas
set -g status-left-length 40
set -g status-left '#[fg=colour51,bold] #S #[fg=colour244]│ #[fg=colour231]#{window_index}:#{window_name}#[fg=colour244]│ '

# Lado derecho: Fecha, hora, CPU, memoria
set -g status-right-length 80
set -g status-right '#[fg=colour244]│ #[fg=colour231]CPU: #{cpu_percentage} │ Mem: #{ram_percentage} │ #[fg=colour51]%Y-%m-%d %H:%M:%S '

# Formato de ventanas
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '

# ============================================================
# Atajos Personalizados
# ============================================================

# Recargar configuración tmux
bind r source-file ~/.tmux.conf \; display-message "Configuración recargada!"

# Dividir paneles
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Navegación entre paneles (usar vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Navegación entre paneles (también con Ctrl+Arrow)
bind -r C-h select-pane -L
bind -r C-j select-pane -D
bind -r C-k select-pane -U
bind -r C-l select-pane -R

# Redimensionar paneles
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Maximizar/restaurar panel
bind z resize-pane -Z

# Cambiar entre paneles
bind o select-pane -t :.+

# Copiar modo mejorado
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# Búsqueda mejorada
bind / copy-mode \; send-keys / 
bind ? copy-mode \; send-keys ?

# Búsqueda incremental
bind -T copy-mode-vi / command-prompt -i -p "Búsqueda:" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ? command-prompt -i -p "Búsqueda:" "send -X search-backward-increcremental \"%%%\""

# Editar archivo actual en vim (si está disponible)
bind e new-window -n "editor" "vim \"#{pane_current_path}\""

# Nuevo panel con directorio actual
bind c new-window -c "#{pane_current_path}"

# ============================================================
# Plugins y Extensiones
# ============================================================

# CPU y memoria (requiere tmux-mem-cpu-load o similar)
# Si tienes tmux-mem-cpu-load instalado, descomenta:
# set -g status-right '#[fg=colour244]│ #[fg=colour231]CPU: #{cpu_percentage} │ Mem: #{ram_percentage} │ #[fg=colour51]%Y-%m-%d %H:%M:%S '

# ============================================================
# Optimizaciones de Rendimiento
# ============================================================

# Reducir latencia
set -s focus-events on
set -g aggressive-resize on

# Mejorar renderizado
set -g default-command "bash -l"

# ============================================================
# Configuración Específica para CACTUS CRM
# ============================================================

# Colores por panel (cuando se usa con dev-tmux.sh)
# Panel 0: API (verde)
# Panel 1: Web (azul)
# Panel 2: Analytics (cyan)
# Panel 3: DB Logs (magenta)

# Indicadores visuales mejorados
setw -g window-status-bell-style 'fg=colour196,bg=colour234,bold'
setw -g window-status-activity-style 'fg=colour196,bg=colour234,bold'

# ============================================================
# Notas
# ============================================================
# 
# Atajos útiles:
#   Ctrl+b r     - Recargar configuración
#   Ctrl+b e     - Abrir editor en directorio actual
#   Ctrl+b /     - Búsqueda en logs
#   Ctrl+b h/j/k/l - Navegar paneles (vim-like)
#   Ctrl+b z     - Maximizar/restaurar panel
#   Ctrl+b [     - Modo scroll (q para salir)
#   Ctrl+b v     - Seleccionar en modo copia
#   Ctrl+b y     - Copiar selección
#
# Para instalar plugins adicionales:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#   Agregar al final del archivo:
#     run '~/.tmux/plugins/tpm/tpm'
#   Luego presionar Ctrl+b I para instalar plugins
#




