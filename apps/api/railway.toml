[build]
# Use Nixpacks builder instead of Dockerfile
builder = "nixpacks"
# Root directory is "/" for monorepo, Railway service should be configured this way

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
