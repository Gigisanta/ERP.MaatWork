[build]
builder = "nixpacks"
buildCommand = "cp ../../pnpm-lock.yaml . && pnpm install --no-frozen-lockfile && pnpm --filter @maatwork/api build"

[build.env]
PNPM_FROZEN_LOCKFILE = "false"
NIXPACKS_NO_CACHE = "true"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# AI_DECISION: Run migrations BEFORE deployment starts
# Justificación: Si las migraciones fallan, el despliegue debe abortarse
# Impacto: Previene que código incompatible con DB corrompa el sistema
# Referencias: Railway best practices - usar preDeployCommand para migraciones
preDeployCommand = "cd ../.. && pnpm --filter @maatwork/db migrate"
