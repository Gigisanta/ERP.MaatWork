# Railway configuration for API service

[railway]
service = "API"

[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm -F @maatwork/types build && pnpm -F @maatwork/utils build && pnpm -F @maatwork/logger build && pnpm -F @maatwork/db build && pnpm -F @maatwork/api build"

[nixpacks]
node_version = "22"

[deploy]
startCommand = "pnpm -F @maatwork/api start"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
