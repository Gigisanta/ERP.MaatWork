# Nixpacks configuration for @maatwork/api (Express.js)
# This config replaces Dockerfile for Railway deployment
# Railway will use this automatically when builder = "nixpacks" in railway.toml

[phases.setup]
# Install pnpm globally before any other setup
nixPkgs = ["nodejs-22"]
cmds = [
  "corepack enable && corepack prepare pnpm@9.10.0 --activate"
]

[phases.build]
# Install dependencies and build the API
cmds = [
  "pnpm install --frozen-lockfile",
  "pnpm -F @maatwork/api build"
]

[phases.build.nixpkgsArchive]
# Use nixpkgs-unstable for latest Node.js versions
url = "https://github.com/NixOS/nixpkgs/archive/nixpkgs-unstable.tar.gz"

[phases.build.nixPkgs]
# Node.js 22 (matches project requirements)
nodejs = "22"

[phases.start]
# Start the production server (app is already built)
cmds = ["pnpm -F @maatwork/api start"]

[phases.start.nixPkgs]
# Runtime dependencies - node_modules are already available
nodejs = "22"

[variables]
# Environment variables for the build process
NODE_ENV = "production"

[deploy]
# Health check configuration
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
