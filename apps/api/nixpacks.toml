# nixpacks.toml - Railway API Service Build Configuration
# Docs: https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@9.10.0 --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm -F @maatwork/types build",
  "pnpm -F @maatwork/utils build",
  "pnpm -F @maatwork/logger build",
  "pnpm -F @maatwork/db build",
  "pnpm -F @maatwork/api build"
]

[start]
cmd = "node apps/api/dist/index.js"

[variables]
NODE_ENV = "production"
