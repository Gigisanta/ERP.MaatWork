# Railway configuration for Web application

[railway]
# Service name in Railway dashboard
service = "Web"

[build]
# Use Nixpacks builder
builder = "nixpacks"

# Build command - build from root to access shared packages
buildCommand = "pnpm install --frozen-lockfile && pnpm -F @maatwork/types build && pnpm -F @maatwork/utils build && pnpm -F @maatwork/logger build && pnpm -F @maatwork/db build && pnpm -F @maatwork/ui build && pnpm -F @maatwork/web build"

[nixpacks]
# Node.js version
node_version = "22"

[deploy]
# Start command
startCommand = "pnpm -F @maatwork/web start"

# Health check
healthcheckPath = "/"
healthcheckTimeout = 300

# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

