[build]
# Use Nixpacks builder instead of Dockerfile
builder = "nixpacks"
# Root directory is "/" for monorepo, Railway service should be configured this way

[deploy]
startCommand = "pnpm -F @maatwork/web start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
