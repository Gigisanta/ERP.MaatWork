# Nixpacks configuration for @maatwork/analytics-service (Python FastAPI)
# This config replaces Dockerfile for Railway deployment
# Railway will use this automatically when builder = "nixpacks" in railway.toml

[phases.setup]
# Python build dependencies
nixPkgs = [
  "python311",
  "gcc",
  "g++",
  "curl"
]

[phases.build]
# Install Python dependencies
cmds = [
  "cd apps/analytics-service && pip install --no-cache-dir -r requirements.txt"
]

[phases.build.nixpkgsArchive]
# Use nixpkgs-unstable for latest Python versions
url = "https://github.com/NixOS/nixpkgs/archive/nixpkgs-unstable.tar.gz"

[phases.start]
# Start FastAPI server with uvicorn
cmds = [
  "cd apps/analytics-service && uvicorn main:app --host 0.0.0.0 --port $PORT"
]

[phases.start.nixPkgs]
# Runtime dependencies
python311 = "*"
curl = "*"

[variables]
# Python-specific environment variables
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"

[deploy]
# Health check configuration
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
