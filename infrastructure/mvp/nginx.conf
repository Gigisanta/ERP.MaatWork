###############################################################################
# NGINX Configuration for Cactus MVP
# Reverse proxy para API, Web y Analytics
###############################################################################

events {
    worker_connections 1024;
}

http {
    # Configuración básica
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    types_hash_bucket_size 128;

    # =============================================================================
    # CLOUDFLARE CONFIGURATION
    # =============================================================================
    # Obtener IP real del cliente desde Cloudflare
    # Cloudflare envía CF-Connecting-IP con la IP real del cliente
    set_real_ip_from 0.0.0.0/0;  # Aceptar IPs de Cloudflare (o restringir a rangos CF)
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Mapear CF-Visitor para detectar HTTPS
    map $http_cf_visitor $forwarded_proto {
        default https;
        '~scheme=http' http;
    }

    # Logs (incluir IP real del cliente)
    log_format cloudflare '$http_cf_connecting_ip - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'CF-Ray: $http_cf_ray';
    
    access_log /var/log/nginx/access.log cloudflare;
    error_log /var/log/nginx/error.log;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Rate limiting - Usar IP real del cliente (CF-Connecting-IP)
    # Si CF-Connecting-IP no está disponible, usar remote_addr como fallback
    map $http_cf_connecting_ip $real_client_ip {
        default $http_cf_connecting_ip;
        '' $remote_addr;
    }
    
    limit_req_zone $real_client_ip zone=api:10m rate=10r/s;
    limit_req_zone $real_client_ip zone=general:10m rate=30r/s;

    # Upstream servers (PM2 on localhost)
    upstream api {
        server 127.0.0.1:3001;
    }

    upstream web {
        server 127.0.0.1:3000;
    }

    upstream analytics {
        server 127.0.0.1:3002;
    }

    # =============================================================================
    # SSL Configuration
    # =============================================================================
    # Cloudflare Origin CA Certificate paths
    ssl_certificate /etc/ssl/cloudflare/origin.crt;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    
    # SSL Protocol Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name maat.work www.maat.work;
        
        # Redirect all HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    # HTTPS Server
    server {
        listen 443 ssl http2;
        server_name maat.work www.maat.work;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Health check endpoint (para ALB/monitoring)
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # API routes
        location /api {
            limit_req zone=api burst=20 nodelay;
            
            # Rewrite /api/xxx to /xxx for the API server
            rewrite ^/api(.*)$ $1 break;
            
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            
            # Cloudflare headers - IP real del cliente
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            
            # Protocolo - Cloudflare siempre envía HTTPS al cliente
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Scheme $forwarded_proto;
            
            # Headers adicionales de Cloudflare
            proxy_set_header CF-Ray $http_cf_ray;
            proxy_set_header CF-Visitor $http_cf_visitor;
            
            # Cookie handling - CRITICAL for authentication
            # Preserve Set-Cookie headers from backend
            proxy_cookie_path / /;
            proxy_cookie_flags ~ secure samesite=lax;
            # Forward cookies from client to backend
            proxy_set_header Cookie $http_cookie;
            # Pass Set-Cookie headers from backend to client
            proxy_pass_header Set-Cookie;
            
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
            proxy_connect_timeout 90s;
        }

        # Analytics routes
        location /analytics {
            limit_req zone=api burst=10 nodelay;
            
            # Rewrite /analytics/xxx to /xxx for the analytics server
            rewrite ^/analytics(.*)$ $1 break;
            
            proxy_pass http://analytics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            
            # Cloudflare headers
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header CF-Ray $http_cf_ray;
            proxy_read_timeout 120s;
            proxy_connect_timeout 90s;
        }

        # Web app (catch-all, debe ir al final)
        location / {
            limit_req zone=general burst=50 nodelay;
            
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            
            # Cloudflare headers - IP real del cliente
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            
            # Protocolo - Cloudflare siempre envía HTTPS al cliente
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Scheme $forwarded_proto;
            
            # Required for Next.js middleware redirects to use correct URL
            proxy_set_header X-Forwarded-Host $host;
            
            # Headers adicionales de Cloudflare
            proxy_set_header CF-Ray $http_cf_ray;
            proxy_set_header CF-Visitor $http_cf_visitor;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # HTTP fallback (para health checks y acceso directo)
    server {
        listen 80;
        server_name _;

        # Health check endpoint (para ALB/monitoring)
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://maat.work$request_uri;
        }
    }
}

