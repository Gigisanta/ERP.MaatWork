# =============================================================================
# Docker Compose para Producción (MVP) - ALTERNATIVA
# =============================================================================
# ⚠️  NOTA: El método principal de deployment es PM2 (ver ecosystem.config.js)
#     Este archivo es una ALTERNATIVA para quienes prefieran Docker.
#
# Ubicación: infrastructure/mvp/docker-compose.yml
# Ejecutar desde la raíz del proyecto:
#   docker-compose -f infrastructure/mvp/docker-compose.yml up -d --build
#
# Para el método recomendado (PM2), usa:
#   ./deploy.sh
# =============================================================================

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
      - analytics
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api}
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  analytics:
    build:
      context: ../..
      dockerfile: apps/analytics-service/Dockerfile
    environment:
      - ENVIRONMENT=production
      - PORT=3002
      - DATABASE_URL=${DATABASE_URL}
    expose:
      - "3002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
